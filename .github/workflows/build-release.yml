name: Build Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          cmdline-tools-version: 11076708

      - name: Install build-tools 34.0.0
        run: |
          yes | sdkmanager "build-tools;34.0.0" > /dev/null 2>&1

      - name: Decode keystore
        run: |
          # 开源一次性软件，keystore base64 直接写死
          echo "" | base64 -d > release.keystore

      - name: Build release APK
        run: |
          # setup-java / setup-android 已通过 shell profile 把 JAVA_HOME / ANDROID_HOME 注入环境
          export PATH="$ANDROID_HOME/build-tools/34.0.0:$PATH"
          chmod +x gradlew

          ./gradlew clean assembleRelease

          APK_UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_ALIGNED="app/build/outputs/apk/release/app-aligned.apk"

          VERSION_NAME=$(grep -E 'versionName\s+' app/build.gradle | head -1 | sed -E 's/^[^"]*"([^"]*)".*$/\1/')
          APK_SIGNED="app/build/outputs/apk/release/AdScreenHolder-${VERSION_NAME}.apk"

          zipalign -p -f 4 "$APK_UNSIGNED" "$APK_ALIGNED"
          apksigner sign \
            --ks release.keystore \
            --ks-pass pass:adscreen123 \
            --ks-key-alias adscreen \
            --key-pass pass:adscreen123 \
            --out "$APK_SIGNED" \
            "$APK_ALIGNED"

          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "APK_SIGNED=$APK_SIGNED" >> "$GITHUB_ENV"
          # tag 直接用 versionName（如 26.7.16+1710），'+' 在 git ref 里合法
          echo "TAG=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=AD Screen Holder $VERSION_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: ""
          files: ${{ env.APK_SIGNED }}
          fail_on_unmatched_files: true
